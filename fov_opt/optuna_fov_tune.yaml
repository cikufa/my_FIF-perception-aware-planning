# Optimization params (names align with trajectory_optimizer_copy.h).
# NOTE: YAML values with *_deg are in degrees and converted to radians inside C++.
# NOTE: fov_schedule values are HALF-FOV angles (alpha) in degrees.
initial_params:
  max_iteration: 30              # max_iteration (iterations)
  ks: 15                         # ks (sigmoid sharpness)
  base_step_scale: 1.0           # base_step_scale
  min_step_deg: 0.3              # min_step_rad (deg input -> rad in C++)
  max_step_deg: 1.5              # max_step_rad (deg input -> rad in C++)
  trajectory_jacobian_step: 0.1  # trajectory_jacobian_step (smoothness weight)
  step_norm_mode: jacobian       # step_norm_mode (default for new logic)
  fov_schedule: "90,60,30, 15"   # fov_schedule_rad (deg input, HALF-FOV alpha)


tune_max_iteration: false          # tune max_iteration
max_iteration_range: [30, 50]      # range for max_iteration
tune_base_step: true               # tune base_step_scale
base_step_scale_range: [0.2, 3.0]  # range for base_step_scale (narrowed for stability)
base_step_scale_log: false         # log-uniform sampling for base_step_scale
tune_min_step_deg: true            # tune min_step_rad (deg input)
min_step_deg_range: [0.1, 2.0]     # range for min_step_deg (deg)
tune_max_step_deg: true            # tune max_step_rad (deg input)
max_step_deg_range: [1.0, 4.0]     # range for max_step_deg (deg)
tune_trajectory_jacobian_step: true    # tune trajectory_jacobian_step
trajectory_jacobian_step_range: [0.05, 0.5] # range for trajectory_jacobian_step (allows 0)
tune_step_norm_mode: true          # tune step_norm_mode
step_norm_mode_options: ["points", "jacobian"] # categorical step_norm_mode values
tune_fov_schedule: true            # tune fov_schedule (HALF-FOV degrees)
fov_schedule_options:
  - "15"                         # single-stage alpha (deg)
  - "30, 15"                     # two-stage alpha schedule (deg)
  - "45,30,15"                   # three-stage alpha schedule (deg)
  - "60,30,15"                   # three-stage alpha schedule (deg)
  - "90,60,30, 15"               # multi-stage alpha schedule (deg)
  - "180,90,30,15"               # aggressive exploration (deg)

tune_ks: true                     # tune ks (sigmoid sharpness)
ks_log: false                     # log-space sampling for ks
ks_transition_deg_range: [5, 20]  # range for ks_transition_deg (deg)
tune_ks_transition_deg: false     # tune ks_transition_deg
ks_transition_deg: 15.9           # default ks_transition_deg (deg)
# Couple ks to the sampled alpha (or last stage in fov schedule).
ks_from_visibility: false         # if true, ks is derived from alpha
ks_visibility_range_multipliers: [0.8, 1.2]  # multiplier range around derived ks
ks_mode_options: ["const15", "const20", "const71", "map"]  # discrete ks choices
